syntax = "proto3";

package echo;

// Minimal unary service used to visually confirm whether gRPC calls survive
// being proxied through the EasyAuth Emulator gateway (see ToDo.md).
service Echo {
  rpc SayHello (HelloRequest) returns (HelloReply);
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}
