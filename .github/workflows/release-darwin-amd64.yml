name: Release (darwin-amd64)

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:

  build:
    name: Build (darwin-amd64)
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: macos-26-intel   # macos-latest is ARM; Intel runner requires explicit label

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # ── Python binary ──────────────────────────────────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          echo "VENV_BIN=.venv/bin" >> "$GITHUB_ENV"
          .venv/bin/pip install pyinstaller -r requirements.txt

      - name: Build binary
        run: $VENV_BIN/python scripts/package.py

      - name: Upload binary archive
        uses: actions/upload-artifact@v7
        with:
          name: binary-darwin-amd64
          path: dist/easyauth-emulator-darwin-amd64.*
          retention-days: 3

      # ── VS Code extension (VSIX) ───────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install npm dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Compile TypeScript
        working-directory: vscode-extension
        run: npm run compile

      - name: Set extension version from tag
        working-directory: vscode-extension
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "unexpected tag: $TAG"; exit 1 ;;
          esac
          npm version "${TAG#v}" --no-git-tag-version

      - name: Package VSIX
        working-directory: vscode-extension
        run: |
          mkdir -p bin
          rm -rf bin/easyauth-emulator
          cp -r ../dist/easyauth-emulator bin/easyauth-emulator
          cp ../LICENSE LICENSE
          cp ../THIRD_PARTY_LICENSES THIRD_PARTY_LICENSES
          npx vsce package --target darwin-x64
          rm LICENSE THIRD_PARTY_LICENSES
          rm -rf bin/easyauth-emulator

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: vsix-darwin-x64
          path: vscode-extension/*.vsix
          retention-days: 3

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write   # required for OIDC token issuance

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          files: |
            artifacts/binary-darwin-amd64/*
            artifacts/vsix-darwin-x64/*

      - name: Sign in to Azure (OIDC)
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Publish to VS Code Marketplace
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        run: |
          npm install -g @vscode/vsce
          for vsix in artifacts/vsix-darwin-x64/*.vsix; do
            echo "Publishing $vsix ..."
            vsce publish --packagePath "$vsix" --azure-credential
          done
