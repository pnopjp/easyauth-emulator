name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # License check — verify THIRD_PARTY_LICENSES is up to date
  # If outdated, hand off to the update-licenses decision gate
  # ─────────────────────────────────────────────────────────────────────────
  check-licenses:
    name: Check licenses
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Check THIRD_PARTY_LICENSES
        id: check
        run: |
          if .venv/bin/python scripts/gen_licenses.py --check 2> check.log; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            cat check.log
            {
              echo "### :warning: THIRD_PARTY_LICENSES is out of date"
              echo
              echo '```diff'
              cat check.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Human decision gate — only runs when licenses have changed
  # Requires a decision from the "license-review" environment:
  #   Approve: regenerate THIRD_PARTY_LICENSES and open a PR against main
  #            (main is protected, so a direct push is not possible)
  #   Reject:  leave THIRD_PARTY_LICENSES untouched
  # Either way, the release stops here. The tag already points at a commit
  # without the fix, so re-tag after the PR is merged to publish it.
  # ─────────────────────────────────────────────────────────────────────────
  update-licenses:
    name: Update THIRD_PARTY_LICENSES
    needs: check-licenses
    if: needs.check-licenses.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment: license-review
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Regenerate THIRD_PARTY_LICENSES
        run: .venv/bin/python scripts/gen_licenses.py

      - name: Open PR with the update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="chore/update-third-party-licenses-$GITHUB_RUN_ID"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add THIRD_PARTY_LICENSES
          git commit -m "chore: update THIRD_PARTY_LICENSES"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore: update THIRD_PARTY_LICENSES" \
            --body "Triggered by the out-of-date check on tag \`$GITHUB_REF_NAME\`. Merge this, then re-tag to release."

  # ─────────────────────────────────────────────────────────────────────────
  # Delete the triggering tag — the release didn't happen either way
  # (Approved: the fix landed on a new main commit, not this tag.
  #  Rejected: nothing changed.) Runs regardless of update-licenses' outcome
  # so the tag can be reused once THIRD_PARTY_LICENSES is confirmed current.
  # ─────────────────────────────────────────────────────────────────────────
  cleanup-tag:
    name: Delete tag (release did not complete)
    needs: [check-licenses, update-licenses]
    if: |
      always() &&
      needs.check-licenses.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Delete triggering tag
        run: |
          echo "::notice::Deleting tag $GITHUB_REF_NAME because THIRD_PARTY_LICENSES was out of date and the release did not complete. Re-tag once it's confirmed up to date."
          git push origin --delete "$GITHUB_REF_NAME"

      - name: Stop release
        run: |
          echo "::notice::THIRD_PARTY_LICENSES was out of date. This release is stopped."
          echo "::notice::If update-licenses opened a PR, merge it, then push a new tag to release."

  # ─────────────────────────────────────────────────────────────────────────
  # Build Python binary + package VSIX for each platform
  # Only runs when THIRD_PARTY_LICENSES was already up to date at tag time
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    needs: check-licenses
    if: needs.check-licenses.outputs.changed == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-amd64
            vscode_target: win32-x64
          - os: macos-latest
            platform: darwin-arm64
            vscode_target: darwin-arm64
          - os: ubuntu-latest
            platform: linux-amd64
            vscode_target: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            vscode_target: linux-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      # ── Python binary ──────────────────────────────────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "VENV_BIN=.venv/Scripts" >> "$GITHUB_ENV"
            .venv/Scripts/pip install pyinstaller -r requirements.txt
          else
            echo "VENV_BIN=.venv/bin" >> "$GITHUB_ENV"
            .venv/bin/pip install pyinstaller -r requirements.txt
          fi

      - name: Build binary
        shell: bash
        run: $VENV_BIN/python scripts/package.py

      - name: Upload binary archive
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.platform }}
          path: dist/easyauth-emulator-${{ matrix.platform }}.*
          retention-days: 3

      # ── VS Code extension (VSIX) ───────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install npm dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Compile TypeScript
        working-directory: vscode-extension
        run: npm run compile

      - name: Set extension version from tag
        working-directory: vscode-extension
        shell: bash
        run: npm version ${GITHUB_REF_NAME#v} --no-git-tag-version

      - name: Package VSIX
        working-directory: vscode-extension
        shell: bash
        run: |
          mkdir -p bin
          rm -rf bin/easyauth-emulator
          cp -r ../dist/easyauth-emulator bin/easyauth-emulator
          cp ../LICENSE LICENSE
          cp ../THIRD_PARTY_LICENSES THIRD_PARTY_LICENSES
          npx vsce package --target ${{ matrix.vscode_target }}
          rm LICENSE THIRD_PARTY_LICENSES
          rm -rf bin/easyauth-emulator

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.vscode_target }}
          path: vscode-extension/*.vsix
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────
  # Unit tests — Python + TypeScript (platform-independent)
  # ─────────────────────────────────────────────────────────────────────────
  test-unit:
    name: Unit tests
    needs: build
    if: |
      always() &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Python unit tests
        run: python -m pytest tests/python/ -v

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install npm dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: TypeScript tests (Linux — needs virtual display)
        working-directory: vscode-extension
        run: xvfb-run -a npm test

  # ─────────────────────────────────────────────────────────────────────────
  # Smoke test — verify each platform binary starts cleanly
  # ─────────────────────────────────────────────────────────────────────────
  test-smoke:
    name: Smoke test (${{ matrix.platform }})
    needs: build
    if: |
      always() &&
      needs.build.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-amd64
          - os: macos-latest
            platform: darwin-arm64
          - os: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: binary-${{ matrix.platform }}
          path: dist/

      - name: Extract binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Expand-Archive -Path "dist/easyauth-emulator-${{ matrix.platform }}.zip" -DestinationPath "dist/"

      - name: Extract binary (Unix)
        if: runner.os != 'Windows'
        run: tar xzf dist/easyauth-emulator-${{ matrix.platform }}.tar.gz -C dist/

      - name: Smoke test
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            dist/easyauth-emulator/easyauth-emulator.exe --help
          else
            chmod +x dist/easyauth-emulator/easyauth-emulator
            dist/easyauth-emulator/easyauth-emulator --help
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Publish — GitHub Release + VS Code Marketplace
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish
    needs: [test-unit, test-smoke]
    if: |
      always() &&
      needs.test-unit.result == 'success' &&
      needs.test-smoke.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write   # required for OIDC token issuance

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@2bb465e97f322d3cb2a965294d483e0d26a67aa9  # v3.0.1
        with:
          generate_release_notes: true
          files: |
            artifacts/binary-windows-amd64/*
            artifacts/binary-darwin-arm64/*
            artifacts/binary-linux-amd64/*
            artifacts/binary-linux-arm64/*
            artifacts/vsix-win32-x64/*
            artifacts/vsix-darwin-arm64/*
            artifacts/vsix-linux-x64/*
            artifacts/vsix-linux-arm64/*

      - name: Sign in to Azure (OIDC)
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a  # v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Publish to VS Code Marketplace
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        run: |
          npm install -g @vscode/vsce
          for vsix in artifacts/vsix-*/*.vsix; do
            echo "Publishing $vsix ..."
            vsce publish --packagePath "$vsix" --azure-credential
          done
