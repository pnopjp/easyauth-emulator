name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # License check — verify THIRD_PARTY_LICENSES is up to date
  # If outdated, pause for human approval before proceeding
  # ─────────────────────────────────────────────────────────────────────────
  check-licenses:
    name: Check licenses
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Check THIRD_PARTY_LICENSES
        id: check
        run: |
          if .venv/bin/python scripts/gen_licenses.py --check; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Human approval gate — only runs when licenses have changed
  # Requires approval from the "license-review" environment
  # ─────────────────────────────────────────────────────────────────────────
  approve-license-change:
    name: Approve license change
    needs: check-licenses
    if: needs.check-licenses.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment: license-review

    steps:
      - name: License change detected
        run: |
          echo "THIRD_PARTY_LICENSES is out of date."
          echo "Please review the license changes and approve to continue the release."

  # ─────────────────────────────────────────────────────────────────────────
  # Build Python binary + package VSIX for each platform
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    needs: [check-licenses, approve-license-change]
    if: |
      always() &&
      needs.check-licenses.result == 'success' &&
      (needs.approve-license-change.result == 'success' || needs.approve-license-change.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-amd64
            vscode_target: win32-x64
          - os: macos-latest
            platform: darwin-arm64
            vscode_target: darwin-arm64
          - os: ubuntu-latest
            platform: linux-amd64
            vscode_target: linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      # ── Python binary ──────────────────────────────────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "VENV_BIN=.venv/Scripts" >> "$GITHUB_ENV"
            .venv/Scripts/pip install pyinstaller -r requirements.txt
          else
            echo "VENV_BIN=.venv/bin" >> "$GITHUB_ENV"
            .venv/bin/pip install pyinstaller -r requirements.txt
          fi

      - name: Build binary
        shell: bash
        run: $VENV_BIN/python scripts/package.py

      - name: Upload binary archive
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.platform }}
          path: dist/easyauth-emulator-${{ matrix.platform }}.*
          retention-days: 3

      # ── VS Code extension (VSIX) ───────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install npm dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Compile TypeScript
        working-directory: vscode-extension
        run: npm run compile

      - name: Set extension version from tag
        working-directory: vscode-extension
        shell: bash
        run: npm version ${GITHUB_REF_NAME#v} --no-git-tag-version

      - name: Package VSIX
        working-directory: vscode-extension
        shell: bash
        run: |
          mkdir -p bin
          rm -rf bin/easyauth-emulator
          cp -r ../dist/easyauth-emulator bin/easyauth-emulator
          cp ../LICENSE LICENSE
          cp ../THIRD_PARTY_LICENSES THIRD_PARTY_LICENSES
          npx vsce package --target ${{ matrix.vscode_target }}
          rm LICENSE THIRD_PARTY_LICENSES
          rm -rf bin/easyauth-emulator

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.vscode_target }}
          path: vscode-extension/*.vsix
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────
  # Unit tests — Python + TypeScript (platform-independent)
  # ─────────────────────────────────────────────────────────────────────────
  test-unit:
    name: Unit tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Python unit tests
        run: python -m pytest tests/python/ -v

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install npm dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: TypeScript tests (Linux — needs virtual display)
        working-directory: vscode-extension
        run: xvfb-run -a npm test

  # ─────────────────────────────────────────────────────────────────────────
  # Smoke test — verify each platform binary starts cleanly
  # ─────────────────────────────────────────────────────────────────────────
  test-smoke:
    name: Smoke test (${{ matrix.platform }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-amd64
          - os: macos-latest
            platform: darwin-arm64
          - os: ubuntu-latest
            platform: linux-amd64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: binary-${{ matrix.platform }}
          path: dist/

      - name: Extract binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Expand-Archive -Path "dist/easyauth-emulator-${{ matrix.platform }}.zip" -DestinationPath "dist/"

      - name: Extract binary (Unix)
        if: runner.os != 'Windows'
        run: tar xzf dist/easyauth-emulator-${{ matrix.platform }}.tar.gz -C dist/

      - name: Smoke test
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            dist/easyauth-emulator/easyauth-emulator.exe --help
          else
            chmod +x dist/easyauth-emulator/easyauth-emulator
            dist/easyauth-emulator/easyauth-emulator --help
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Publish — GitHub Release + VS Code Marketplace
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish
    needs: [test-unit, test-smoke]
    if: always() && needs.test-unit.result == 'success' && needs.test-smoke.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write   # required for OIDC token issuance

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/binary-windows-amd64/*
            artifacts/binary-darwin-arm64/*
            artifacts/binary-linux-amd64/*
            artifacts/vsix-win32-x64/*
            artifacts/vsix-darwin-arm64/*
            artifacts/vsix-linux-x64/*

      - name: Sign in to Azure (OIDC)
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Publish to VS Code Marketplace
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        run: |
          npm install -g @vscode/vsce
          for vsix in artifacts/vsix-*/*.vsix; do
            echo "Publishing $vsix ..."
            vsce publish --packagePath "$vsix" --azure-credential
          done
