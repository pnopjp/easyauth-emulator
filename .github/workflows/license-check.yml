name: License Check

on:
  pull_request:
    paths:
      - requirements.txt

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Post a comment on PRs that change requirements.txt
  # Includes a license summary table for changed packages
  # ─────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify reviewers
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Build license summary table
        id: summary
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          .venv/bin/python - <<'EOF'
          import re, subprocess, importlib.metadata, os

          PKG_NAME_RE = re.compile(r'^[A-Za-z0-9._-]+$')

          base_ref = os.environ['BASE_REF']
          subprocess.run(['git', 'fetch', 'origin', base_ref], check=True)

          diff = subprocess.run(
              ['git', 'diff', f'origin/{base_ref}', '--', 'requirements.txt'],
              capture_output=True, text=True, check=True
          ).stdout

          rows = []
          for line in diff.splitlines():
              if not line.startswith('+') or line.startswith('+++'):
                  continue
              spec = line[1:].strip()
              if not spec or spec.startswith('#'):
                  continue
              pkg = spec
              for op in ('==', '>=', '<=', '~=', '!=', '>', '<'):
                  if op in pkg:
                      pkg = pkg[:pkg.index(op)].strip()
                      break
              if not PKG_NAME_RE.match(pkg):
                  continue
              try:
                  meta = importlib.metadata.metadata(pkg)
                  version = meta['Version']
                  lic = meta.get('License-Expression') or meta.get('License') or ''
                  if not lic:
                      classifiers = meta.get_all('Classifier') or []
                      ids = [c.split(' :: ')[-1] for c in classifiers if c.startswith('License ::')]
                      lic = ', '.join(ids) or '(unknown)'
                  rows.append(f'| {meta["Name"]} | {version} | {lic} |')
              except importlib.metadata.PackageNotFoundError:
                  rows.append(f'| {pkg} | - | (not installed) |')

          if rows:
              table = '| Package | Version | License |\n| --- | --- | --- |\n' + '\n'.join(rows)
          else:
              table = '(no changes)'

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'table<<EOF\n{table}\nEOF\n')
          EOF

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          TABLE: ${{ steps.summary.outputs.table }}
        with:
          script: |
            const table = process.env.TABLE;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '⚠️ **`requirements.txt` has been modified.**',
                '',
                'Licenses of added/updated packages:',
                '',
                table,
                '',
                'Please verify the following:',
                '1. No problematic license types (e.g. GPL/LGPL copyleft) have been introduced',
                '2. `THIRD_PARTY_LICENSES` has been updated correctly',
              ].join('\n')
            })

  # ─────────────────────────────────────────────────────────────────────────
  # Check THIRD_PARTY_LICENSES and auto-update if needed
  # - Same-repo PR: auto-commit
  # - Fork PR: post Suggested Changes
  # ─────────────────────────────────────────────────────────────────────────
  update-licenses:
    name: Update THIRD_PARTY_LICENSES
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Generate THIRD_PARTY_LICENSES
        id: generate
        run: |
          .venv/bin/python scripts/gen_licenses.py
          if git diff --quiet THIRD_PARTY_LICENSES; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Same-repo PR: auto-commit
      - name: Auto-commit (same-repo PR)
        if: |
          steps.generate.outputs.changed == 'true' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add THIRD_PARTY_LICENSES
          git commit -m "chore: update THIRD_PARTY_LICENSES"
          git push

      # Fork PR: post Suggested Changes
      - name: Post Suggested Changes (fork PR)
        if: |
          steps.generate.outputs.changed == 'true' &&
          github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const content = fs.readFileSync('THIRD_PARTY_LICENSES', 'utf8')

            // Find the current file in the PR to get its position
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            })

            const targetFile = files.find(f => f.filename === 'THIRD_PARTY_LICENSES')
            const sha = context.payload.pull_request.head.sha

            if (targetFile) {
              // File is in the diff — post a suggestion on it
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                commit_id: sha,
                event: 'REQUEST_CHANGES',
                comments: [{
                  path: 'THIRD_PARTY_LICENSES',
                  position: 1,
                  body: '```suggestion\n' + content + '\n```',
                }],
              })
            } else {
              // File is not in the diff — post a comment with the full content
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: [
                  '⚠️ **`THIRD_PARTY_LICENSES` needs to be updated.**',
                  '',
                  'Please run the following locally and commit the result:',
                  '```',
                  'python scripts/gen_licenses.py',
                  'git add THIRD_PARTY_LICENSES',
                  'git commit -m "chore: update THIRD_PARTY_LICENSES"',
                  '```',
                  '',
                  '<details><summary>Updated file content</summary>',
                  '',
                  '```',
                  content,
                  '```',
                  '</details>',
                ].join('\n')
              })
            }

  # ─────────────────────────────────────────────────────────────────────────
  # Required status check — blocks merge if THIRD_PARTY_LICENSES is outdated
  # ─────────────────────────────────────────────────────────────────────────
  check:
    name: THIRD_PARTY_LICENSES up to date
    runs-on: ubuntu-latest
    needs: update-licenses

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Check THIRD_PARTY_LICENSES
        run: .venv/bin/python scripts/gen_licenses.py --check
